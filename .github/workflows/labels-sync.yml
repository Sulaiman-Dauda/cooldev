name: Sync labels

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/repository-labels.json'
      - '.github/workflows/labels-sync.yml'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync repository labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs')
            const labels = JSON.parse(fs.readFileSync('.github/repository-labels.json', 'utf8'))
            const owner = context.repo.owner
            const repo = context.repo.repo
            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100,
            })
            const existingByName = new Map(existing.map((label) => [label.name, label]))

            for (const label of labels) {
              const current = existingByName.get(label.name)
              if (!current) {
                core.info(`Creating label: ${label.name}`)
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                })
                continue
              }

              const currentColor = String(current.color || '').toLowerCase()
              const nextColor = String(label.color || '').toLowerCase()
              const currentDescription = current.description || ''
              const nextDescription = label.description || ''
              if (currentColor !== nextColor || currentDescription !== nextDescription) {
                core.info(`Updating label: ${label.name}`)
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                })
              }
            }
