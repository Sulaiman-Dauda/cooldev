name: Secret scanning

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'release/**'
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      REPORT_PATH: dist/security/gitleaks-results.sarif
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz
          mkdir -p "$RUNNER_TEMP/bin"
          install -m 0755 gitleaks "$RUNNER_TEMP/bin/gitleaks"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Scan git history for secrets
        id: gitleaks_scan
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p "$(dirname "${REPORT_PATH}")"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gitleaks git \
              --redact \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --report-format sarif \
              --report-path "${REPORT_PATH}" \
              --exit-code 1
          else
            gitleaks git \
              --redact \
              --report-format sarif \
              --report-path "${REPORT_PATH}" \
              --exit-code 1
          fi

      - name: Upload secret scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_PATH }}
          category: gitleaks

      - name: Fail if secrets were detected
        if: steps.gitleaks_scan.outcome == 'failure'
        run: |
          echo "Potential secrets were detected by the repository secret scan."
          exit 1
