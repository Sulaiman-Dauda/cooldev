name: PR labels

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply file-based labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Apply release and triage labels
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const pr = context.payload.pull_request
            const title = String(pr.title || '')
            const body = String(pr.body || '')
            const headRef = String(pr.head.ref || '')
            const haystack = `${title}\n${body}\n${headRef}`.toLowerCase()
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            })
            const fileNames = files.map((file) => file.filename)
            const labels = new Set(['needs-triage'])

            const releaseFiles = [
              'package.json',
              'package-lock.json',
              'CHANGELOG.md',
              'docker-compose.release.yml',
              'scripts/create-release-tag.sh',
              'scripts/build-release-bundle.sh',
              '.github/workflows/release.yml',
            ]

            if (releaseFiles.some((path) => fileNames.includes(path)) || /\brelease\b/.test(haystack)) {
              labels.add('release')
            }

            if (/\b(alpha|beta|rc|prerelease)\b/.test(haystack) || /-rc\.|-beta\.|-alpha\./.test(haystack)) {
              labels.add('prerelease')
            }

            if (fileNames.includes('package.json') || fileNames.includes('CHANGELOG.md')) {
              labels.add('versioning')
            }

            if (
              fileNames.some((name) => name.startsWith('.github/'))
              || fileNames.includes('CONTRIBUTING.md')
            ) {
              labels.add('area: governance')
            }

            const existingLabels = pr.labels.map((label) => label.name)
            const missing = [...labels].filter((label) => !existingLabels.includes(label))
            if (missing.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: missing,
              })
            }
