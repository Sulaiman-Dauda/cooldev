version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - needs-triage
    commit-message:
      prefix: chore
      include: scope
    groups:
      node-runtime-and-tooling:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area: ci
      - needs-triage
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area: installer
      - needs-triage
    commit-message:
      prefix: build
      include: scope
    groups:
      docker-base-images:
        patterns:
          - "*"
